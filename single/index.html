<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Release</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; cursor: none; overflow-x: hidden; }
        #cursor { width: 20px; height: 20px; background: rgba(6, 182, 212, 0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: screen; transition: transform 0.1s; }
        .dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(100px) brightness(0.2); opacity: 0.7; z-index: -1; transition: background-image 1.5s ease; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="bg-layer" class="dynamic-bg"></div>

    <nav class="fixed top-0 w-full z-50 py-8 px-10">
        <a href="/music" class="text-[9px] uppercase tracking-[0.6em] font-bold text-gray-500 hover:text-cyan-400 transition-colors">
            <i class="fas fa-chevron-left mr-2"></i> Catalog
        </a>
    </nav>

    <main class="min-h-screen flex items-center justify-center p-6">
        <div id="content" class="max-w-5xl w-full grid md:grid-cols-2 gap-16 items-center">
            <img id="song-cover" src="" class="w-full aspect-square object-cover rounded-2xl shadow-2xl">
            <div class="space-y-10">
                <div class="space-y-4">
                    <p id="song-date" class="text-cyan-500 text-[10px] font-bold tracking-[0.5em] uppercase"></p>
                    <h1 id="song-title" class="text-6xl md:text-8xl font-black italic tracking-tighter leading-none uppercase"></h1>
                </div>
                <div id="links-container" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const songSlug = urlParams.get('song');
            const res = await fetch('/music.json');
            const music = await res.json();
            const song = music.find(s => s.path.includes(`song=${songSlug}`));

            if (song) {
                document.getElementById('song-title').innerText = song.title;
                document.getElementById('song-cover').src = song.cover_url;
                document.getElementById('bg-layer').style.backgroundImage = `url(${song.cover_url})`;
                document.getElementById('song-date').innerText = `Released ${new Date(song.release_date).getFullYear()}`;
                
                const container = document.getElementById('links-container');
                const platforms = [
                    { name: 'Spotify', icon: 'fa-spotify', link: song.spotify_url },
                    { name: 'Apple Music', icon: 'fa-apple', link: song.apple_url },
                    { name: 'YouTube', icon: 'fa-youtube', link: song.youtube_url }
                ];

                container.innerHTML = platforms
                    .filter(p => p.link && p.link !== "NULL")
                    .map(p => `
                        <a href="${p.link}" target="_blank" class="glass-card flex items-center justify-between p-5 rounded-xl group hover:bg-white/5 transition-all">
                            <span class="flex items-center gap-5 text-[11px] font-bold uppercase tracking-[0.2em]"><i class="fab ${p.icon} text-xl text-gray-400 group-hover:text-cyan-400"></i> ${p.name}</span>
                            <i class="fas fa-external-link-alt text-[8px] opacity-0 group-hover:opacity-100 text-cyan-400 transition-all"></i>
                        </a>
                    `).join('');
            }
        }
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX - 10 + 'px';
            c.style.top = e.clientY - 10 + 'px';
        });
        init();
    </script>
</body>
</html>
