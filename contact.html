<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact // DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-orange: #FF5F1F; --accent-cyan: #06B6D4; }
        body { background: #050505; color: white; font-family: sans-serif; }
        .accent { color: var(--accent-orange); }
        .cyan-border { border-color: var(--accent-cyan); }
    </style>
</head>
<body class="flex items-center min-h-screen p-8 md:p-24">
    <div class="max-w-6xl w-full mx-auto grid md:grid-cols-2 gap-16 md:gap-24">
        
        <div class="space-y-6">
            <nav class="mb-12">
                <a href="/" class="text-[10px] uppercase tracking-[0.5em] text-gray-500 hover:text-white transition-colors">← Escape</a>
            </nav>
            <h1 class="text-7xl md:text-8xl font-black italic uppercase tracking-tighter leading-none">Connect</h1>
            <div class="h-1 w-20 bg-cyan-500"></div>
            <p class="text-gray-500 uppercase tracking-[0.3em] text-[9px] font-bold">Booking // Production // Features</p>
        </div>

        <div class="flex flex-col justify-center space-y-12">
            <div class="group">
                <label class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold block mb-3">Electronic Mail</label>
                <a href="mailto:officialdoubleu@gmail.com" class="text-3xl md:text-5xl font-light hover:text-cyan-400 transition-all underline decoration-white/5 underline-offset-8">
                    Contact Artist
                </a>
            </div>

            <div class="group">
                <label class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold block mb-1">Base of Operations</label>
                <p class="text-4xl md:text-6xl font-black italic tracking-tighter uppercase accent">Oklahoma City</p>
            </div>
            
            <div class="pt-8 border-t border-white/5 flex gap-8">
                <a href="/about" class="text-[9px] uppercase tracking-widest font-bold hover:text-cyan-400 transition-colors">History</a>
                <a href="/music" class="text-[9px] uppercase tracking-widest font-bold hover:text-cyan-400 transition-colors">Sounds</a>
            </div>
        </div>
    </div>
</body>
</html>
