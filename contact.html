<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact // DoubleU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .accent { color: #FF5F1F; }
    </style>
</head>
<body class="flex items-center min-h-screen p-8 md:p-24">
    <div class="max-w-6xl w-full mx-auto grid md:grid-cols-2 gap-24">
        
        <div class="space-y-6">
            <nav class="mb-12">
                <a href="/" class="text-[10px] uppercase tracking-[0.5em] text-gray-500 hover:text-white">← Escape</a>

            <div class="group">
                <label class="text-[9px] uppercase tracking-[0.4em] text-gray-600 font-bold block mb-2">Location</label>

            </div>
            
            <div class="pt-8 border-t border-white/5 flex gap-8">
                <a href="/about.html" class="text-[9px] uppercase tracking-widest font-bold hover:text-cyan-500">Biography</a>
                <a href="/music.html" class="text-[9px] uppercase tracking-widest font-bold hover:text-cyan-500">Discography</a>
            </div>

    </div>

</html>
